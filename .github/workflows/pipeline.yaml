name: Data Pipeline CI

# Se dispara en push a cualquier rama y en Pull Requests hacia main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_run:
    runs-on: ubuntu-latest
    
    # Configuración para que todos los pasos se ejecuten dentro de la carpeta del ejercicio
    defaults:
      run:
        working-directory: ./ejercicio_1

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Ejecutar Pruebas Unitarias (Pytest)
      run: |
        python -m pytest tests/test_validation.py

    - name: Ejecutar Proceso ETL
      # Este paso verificará que el script genere la carpeta 'processed' y el CSV final
      run: |
        python src/main.py

    - name: Verificar resultados
      # Paso extra para confirmar en los logs que el archivo de salida se creó
      run: |
        ls -R data/processed/